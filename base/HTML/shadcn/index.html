<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Mappable</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Mappable">
      <header class="app-header">
        <a class="wordmark" href="index.html" aria-label="Mappable home">Mappable</a>
        <span class="status-badge" role="status">
          <span class="status-dot" aria-hidden="true"></span>
          Syncing
        </span>
      </header>

      <section class="summary-card card" aria-label="Loading search summary">
        <div class="skeleton skeleton-label"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line"></div>
      </section>

      <div class="workspace">
        <section class="results-panel" aria-label="Loading companies">
          <div class="results-heading">
            <div class="skeleton skeleton-heading"></div>
            <div class="skeleton skeleton-count"></div>
          </div>
          <div class="results-list">
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
          </div>
        </section>

        <section class="map-card card" aria-label="Loading map">
          <div class="map-toolbar">
            <div class="skeleton skeleton-map-label"></div>
            <div class="skeleton skeleton-map-control"></div>
          </div>
          <div class="map-canvas" aria-hidden="true">
            <span class="map-road road-a"></span>
            <span class="map-road road-b"></span>
            <span class="map-road road-c"></span>
            <span class="map-block block-a"></span>
            <span class="map-block block-b"></span>
            <span class="map-block block-c"></span>
            <span class="map-pin pin-a"></span>
            <span class="map-pin pin-b"></span>
            <span class="map-pin pin-c"></span>
            <span class="map-pin pin-d"></span>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
