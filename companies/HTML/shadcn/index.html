<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Mappable</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Mappable">
      <header class="app-header">
        <a class="wordmark" href="index.html" aria-label="Mappable home">Mappable</a>
        <span class="status-badge" role="status">
          <span class="status-dot" aria-hidden="true"></span>
          4 companies
        </span>
      </header>

      <section class="summary-card card" aria-labelledby="summary-title">
        <p class="eyebrow">San Francisco</p>
        <h1 id="summary-title">Series B companies hiring for applied AI</h1>
        <p>Choose a company to view its details.</p>
      </section>

      <div class="workspace">
        <section class="results-panel" aria-labelledby="results-title">
          <div class="results-heading">
            <h2 id="results-title">Companies</h2>
            <span>4 results</span>
          </div>
          <div class="results-list">
            <button class="result-card card" type="button" data-company="Doss">Doss</button>
            <button class="result-card card" type="button" data-company="Pylon">Pylon</button>
            <button class="result-card card" type="button" data-company="Shepherd">Shepherd</button>
            <button class="result-card card" type="button" data-company="HappyRobot">HappyRobot</button>
          </div>
        </section>

        <section class="map-card card" aria-label="San Francisco company map">
          <div class="map-toolbar">
            <span>San Francisco</span>
            <span class="map-count">4</span>
          </div>
          <div class="map-canvas">
            <svg class="sf-map" viewBox="0 0 1000 760" role="img" aria-labelledby="sf-map-title">
              <title id="sf-map-title">San Francisco company map</title>
              <image href="assets/san-francisco-basemap.svg" width="1000" height="760"></image>
              <g id="map-pin-layer"></g>
            </svg>
          </div>
        </section>
      </div>
    </main>

    <dialog class="company-dialog" aria-labelledby="dialog-company-name">
      <div class="app-shell dialog-shell">
        <header class="app-header">
          <a class="wordmark" href="index.html" aria-label="Mappable home">Mappable</a>
          <button class="close-button" type="button" aria-label="Close company details">
            <span aria-hidden="true">&times;</span>
          </button>
        </header>
        <div class="dialog-content">
          <p class="eyebrow">Company</p>
          <h2 id="dialog-company-name"></h2>
        </div>
      </div>
    </dialog>

    <script>
      const dialog = document.querySelector('.company-dialog');
      const dialogName = document.querySelector('#dialog-company-name');
      const closeButton = document.querySelector('.close-button');

      document.querySelectorAll('[data-company]').forEach((card) => {
        card.addEventListener('click', () => {
          dialogName.textContent = card.dataset.company;
          dialog.showModal();
          closeButton.focus();
        });
      });

      closeButton.addEventListener('click', () => dialog.close());

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && dialog.open) dialog.close();
      });
    </script>
  </body>
</html>
