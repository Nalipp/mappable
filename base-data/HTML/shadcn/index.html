<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Mappable</title>
    <link rel="stylesheet" href="vendor/maplibre-gl-5.24.0/maplibre-gl.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Mappable">
      <header class="app-header">
        <a class="wordmark" href="index.html" aria-label="Mappable home">Mappable</a>
        <span class="status-badge" role="status">
          <span class="status-dot" aria-hidden="true"></span>
          Syncing
        </span>
      </header>

      <section class="summary-card card" aria-label="Loading search summary">
        <div class="skeleton skeleton-label"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line"></div>
      </section>

      <div class="workspace">
        <section class="results-panel" aria-label="Loading companies">
          <div class="results-heading">
            <div class="skeleton skeleton-heading"></div>
            <div class="skeleton skeleton-count"></div>
          </div>
          <div class="results-list">
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
            <article class="result-card card" aria-label="Loading result"><div class="skeleton skeleton-icon"></div><div class="result-copy"><div class="skeleton skeleton-result-title"></div><div class="skeleton skeleton-result-line"></div><div class="skeleton skeleton-result-line short"></div></div></article>
          </div>
        </section>

        <section class="map-card card" aria-label="Interactive map">
          <div class="map-toolbar">
            <div class="skeleton skeleton-map-label"></div>
            <span class="map-status" id="map-status" role="status">Loading map</span>
          </div>
          <div class="map-canvas">
            <div id="map" aria-label="Interactive map of finalized records"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="vendor/maplibre-gl-5.24.0/maplibre-gl.js"></script>
    <script>
      const mapStatus = document.querySelector('#map-status');
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: [-98.5, 38.5],
        zoom: 3.25,
        attributionControl: true
      });

      map.addControl(new maplibregl.NavigationControl(), 'top-right');

      map.on('load', () => {
        mapStatus.textContent = 'Map loaded';
      });

      map.on('error', () => {
        if (!map.loaded()) mapStatus.textContent = 'Map unavailable';
      });
    </script>
  </body>
</html>
